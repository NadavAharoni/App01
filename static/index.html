<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App01 — Welcome</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .tab-btn.active { @apply border-b-2 border-indigo-600 text-indigo-600 font-semibold; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 to-indigo-50 flex items-center justify-center p-4">

  <!-- ════════════════ AUTH CARD ════════════════ -->
  <div id="auth-card" class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

      <!-- Header -->
      <div class="bg-indigo-600 px-8 py-6 text-center">
        <h1 class="text-2xl font-bold text-white tracking-tight">App01</h1>
        <p class="text-indigo-200 text-sm mt-1">Your cloud-native starter</p>
      </div>

      <div class="px-8 py-6">

        <!-- Google button -->
        <a href="/auth/google"
           class="flex items-center justify-center gap-3 w-full border border-slate-300 rounded-lg py-2.5 px-4 hover:bg-slate-50 transition text-slate-700 font-medium shadow-sm">
          <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </a>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-5">
          <div class="flex-1 h-px bg-slate-200"></div>
          <span class="text-slate-400 text-xs uppercase tracking-widest">or</span>
          <div class="flex-1 h-px bg-slate-200"></div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-slate-200 mb-5 gap-4">
          <button onclick="switchTab('login')"
                  id="tab-login"
                  class="tab-btn active pb-2 text-sm transition-colors">Login</button>
          <button onclick="switchTab('register')"
                  id="tab-register"
                  class="tab-btn pb-2 text-sm text-slate-500 transition-colors">Register</button>
        </div>

        <!-- Login form -->
        <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Email</label>
            <input name="email" type="email" required placeholder="you@example.com"
                   class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Password</label>
            <input name="password" type="password" required placeholder="••••••••"
                   class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <p id="login-error" class="text-red-500 text-xs hidden"></p>
          <button type="submit"
                  class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg py-2.5 text-sm font-semibold transition shadow">
            Log In
          </button>
        </form>

        <!-- Register form -->
        <form id="form-register" onsubmit="handleRegister(event)" class="space-y-4 hidden">
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Username</label>
            <input name="username" type="text" required placeholder="cooluser"
                   class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Email</label>
            <input name="email" type="email" required placeholder="you@example.com"
                   class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Password</label>
            <input name="password" type="password" required placeholder="min 8 characters"
                   class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <p id="register-error" class="text-red-500 text-xs hidden"></p>
          <button type="submit"
                  class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg py-2.5 text-sm font-semibold transition shadow">
            Create Account
          </button>
        </form>

      </div>
    </div>
  </div>

  <!-- ════════════════ DASHBOARD ════════════════ -->
  <div id="dashboard" class="w-full max-w-2xl hidden">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

      <!-- Top bar -->
      <div class="bg-indigo-600 px-8 py-5 flex items-center justify-between">
        <h1 class="text-xl font-bold text-white">App01 Dashboard</h1>
        <button onclick="handleLogout()"
                class="text-indigo-200 hover:text-white text-sm border border-indigo-400 hover:border-white rounded-lg px-4 py-1.5 transition">
          Logout
        </button>
      </div>

      <div class="px-8 py-8">
        <!-- Avatar + name -->
        <div class="flex items-center gap-5 mb-8">
          <img id="user-avatar" src="" alt="Avatar"
               class="w-16 h-16 rounded-full border-4 border-indigo-100 object-cover hidden" />
          <div id="user-initials"
               class="w-16 h-16 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-2xl font-bold">
          </div>
          <div>
            <h2 id="user-name" class="text-xl font-semibold text-slate-800"></h2>
            <span id="user-provider"
                  class="inline-block text-xs font-medium bg-indigo-50 text-indigo-600 rounded-full px-3 py-0.5 mt-1">
            </span>
          </div>
        </div>

        <!-- Details grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="bg-slate-50 rounded-xl p-4">
            <p class="text-xs text-slate-400 uppercase tracking-wide mb-1">Email</p>
            <p id="user-email" class="text-slate-700 font-medium text-sm break-all"></p>
          </div>
          <div class="bg-slate-50 rounded-xl p-4">
            <p class="text-xs text-slate-400 uppercase tracking-wide mb-1">Username</p>
            <p id="user-username" class="text-slate-700 font-medium text-sm"></p>
          </div>
          <div class="bg-slate-50 rounded-xl p-4">
            <p class="text-xs text-slate-400 uppercase tracking-wide mb-1">User ID</p>
            <p id="user-id" class="text-slate-700 font-medium text-xs font-mono break-all"></p>
          </div>
          <div class="bg-slate-50 rounded-xl p-4">
            <p class="text-xs text-slate-400 uppercase tracking-wide mb-1">Auth Provider</p>
            <p id="user-provider-detail" class="text-slate-700 font-medium text-sm capitalize"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Tab switching ──────────────────────────────────────
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').classList.toggle('hidden', !isLogin);
      document.getElementById('form-register').classList.toggle('hidden', isLogin);
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-register').classList.toggle('active', !isLogin);
      document.getElementById('tab-login').classList.toggle('text-slate-500', !isLogin);
      document.getElementById('tab-register').classList.toggle('text-slate-500', isLogin);
    }

    // ── Show dashboard ─────────────────────────────────────
    function showDashboard(user) {
      document.getElementById('auth-card').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');

      const display = user.full_name || user.username || user.email;
      document.getElementById('user-name').textContent = display;
      document.getElementById('user-email').textContent = user.email;
      document.getElementById('user-username').textContent = user.username || '—';
      document.getElementById('user-id').textContent = user.id;
      document.getElementById('user-provider').textContent =
        user.auth_provider === 'google' ? '🔵 Google Account' : '🔒 Local Account';
      document.getElementById('user-provider-detail').textContent = user.auth_provider;

      if (user.avatar_url) {
        const img = document.getElementById('user-avatar');
        img.src = user.avatar_url;
        img.classList.remove('hidden');
        document.getElementById('user-initials').classList.add('hidden');
      } else {
        const initials = (display || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        document.getElementById('user-initials').textContent = initials;
      }
    }

    // ── Auth form handlers ─────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      const form = e.target;
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');
      const body = {
        email: form.email.value,
        password: form.password.value,
      };
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          credentials: 'same-origin',
        });
        if (!res.ok) {
          const data = await res.json();
          errEl.textContent = data.detail || 'Login failed';
          errEl.classList.remove('hidden');
          return;
        }
        const user = await res.json();
        showDashboard(user);
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const form = e.target;
      const errEl = document.getElementById('register-error');
      errEl.classList.add('hidden');
      const body = {
        email: form.email.value,
        username: form.username.value,
        password: form.password.value,
      };
      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          credentials: 'same-origin',
        });
        if (!res.ok) {
          const data = await res.json();
          errEl.textContent = data.detail || 'Registration failed';
          errEl.classList.remove('hidden');
          return;
        }
        const user = await res.json();
        showDashboard(user);
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
      }
    }

    async function handleLogout() {
      await fetch('/auth/logout', { method: 'POST', credentials: 'same-origin' });
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('auth-card').classList.remove('hidden');
    }

    // ── On load: check if already logged in ───────────────
    (async () => {
      try {
        const res = await fetch('/auth/me', { credentials: 'same-origin' });
        if (res.ok) {
          const user = await res.json();
          showDashboard(user);
        }
      } catch { /* not logged in */ }
    })();
  </script>
</body>
</html>
